---
# =============================================================================
# QNAP NAS SECURITY AUDIT - PORTFOLIO EXAMPLE
# =============================================================================
#
# Purpose: Comprehensive security assessment for QNAP NAS systems
# Features: Port scanning, service auditing, user verification, access monitoring
# Security Focus: Network security, service hardening, access control
#
# This playbook demonstrates enterprise-grade security auditing techniques
# for network-attached storage systems in production environments.
#
# =============================================================================

- name: QNAP NAS Security Audit and Assessment
  hosts: nas
  gather_facts: false
  
  vars:
    # Security audit configuration
    audit_report_dir: "/tmp/security_audit"
    critical_ports: "21,22,23,25,53,80,110,135,139,143,443,445,993,995"
    security_services: "ssh,smb,ftp,http,https,telnet"
    
  tasks:
    - name: Create security audit directory
      ansible.builtin.file:
        path: "{{ audit_report_dir }}"
        state: directory
        mode: '0700'  # Restricted permissions for security reports
      delegate_to: localhost
      run_once: true
      
    - name: Get audit timestamp
      ansible.builtin.raw: date
      register: audit_timestamp
      delegate_to: localhost
      run_once: true
      
    - name: Scan for active network services
      ansible.builtin.raw: "netstat -tuln"
      register: network_services
      
    - name: Check critical port exposure
      ansible.builtin.raw: "netstat -tuln | grep -E ':(21|22|23|25|53|80|110|135|139|143|443|445|993|995)'"
      register: critical_ports_check
      ignore_errors: yes
      
    - name: Display port security status
      ansible.builtin.debug:
        msg: "Critical ports audit: {{ critical_ports_check.stdout_lines | length }} services detected"
      
    - name: Audit running security services
      ansible.builtin.raw: "ps aux | grep -E '(ssh|smb|ftp|http)' | grep -v grep"
      register: security_processes
      ignore_errors: yes
      
    - name: Check for unauthorized network tools
      ansible.builtin.raw: "ps aux | grep -E '(nc|netcat|nmap|wget|curl|telnet)' | grep -v grep"
      register: network_tools_check
      ignore_errors: yes
      
    - name: Verify user account security
      ansible.builtin.raw: "cat /etc/passwd | cut -d: -f1 | wc -l"
      register: user_count
      ignore_errors: yes
      
    - name: Check for admin account presence
      ansible.builtin.raw: "grep -c 'admin' /etc/passwd"
      register: admin_check
      ignore_errors: yes
      
    - name: Audit SSH configuration (if accessible)
      ansible.builtin.raw: "grep -E '(PasswordAuthentication|PermitRootLogin|Port)' /etc/ssh/sshd_config 2>/dev/null || echo 'SSH config not accessible'"
      register: ssh_config_audit
      ignore_errors: yes
      
    - name: Check system log access
      ansible.builtin.raw: "ls -la /var/log/ | head -10"
      register: log_access_check
      ignore_errors: yes
      
    - name: Monitor active network connections
      ansible.builtin.raw: "netstat -tuln | grep ESTABLISHED | wc -l"
      register: active_connections
      ignore_errors: yes
      
    - name: Generate comprehensive security audit report
      ansible.builtin.copy:
        content: |
          ===============================================
          QNAP NAS Security Audit Report
          ===============================================
          Audit Timestamp: {{ audit_timestamp.stdout.strip() }}
          Target System: {{ inventory_hostname }}
          Audit Scope: Network services, access control, system security
          
          NETWORK SERVICE AUDIT:
          Total network services: {{ network_services.stdout_lines | length }}
          
          CRITICAL PORT ASSESSMENT:
          {{ critical_ports_check.stdout if critical_ports_check.stdout else 'No critical ports detected in scan' }}
          
          SECURITY SERVICE STATUS:
          {{ security_processes.stdout if security_processes.stdout else 'No matching security services detected' }}
          
          NETWORK TOOLS DETECTION:
          {{ network_tools_check.stdout if network_tools_check.stdout else 'No unauthorized network tools detected' }}
          
          USER ACCOUNT AUDIT:
          Total system users: {{ user_count.stdout.strip() if user_count.rc == 0 else 'User count unavailable' }}
          Admin account status: {{ 'Present' if admin_check.stdout and admin_check.stdout.strip() != '0' else 'Not detected' }}
          
          SSH CONFIGURATION REVIEW:
          {{ ssh_config_audit.stdout }}
          
          SYSTEM LOG ACCESS:
          {{ log_access_check.stdout if log_access_check.rc == 0 else 'System logs not accessible for audit' }}
          
          CONNECTION MONITORING:
          Active established connections: {{ active_connections.stdout.strip() if active_connections.rc == 0 else 'Connection count unavailable' }}
          
          ===============================================
          SECURITY RECOMMENDATIONS:
          - Review exposed network services
          - Verify SSH configuration hardening
          - Monitor user account access
          - Implement regular security auditing
          - Consider firewall configuration review
          ===============================================
          
          Audit Status: Complete
          Compliance Level: Review recommendations above
          Next Audit: Recommended within 30 days
          ===============================================
        dest: "{{ audit_report_dir }}/security_audit_{{ ansible_date_time.epoch | default('manual') }}.txt"
      delegate_to: localhost
      
    - name: Display security audit summary
      ansible.builtin.debug:
        msg:
          - "🔒 Security audit completed"
          - "🌐 Network services: {{ network_services.stdout_lines | length }} analyzed"
          - "⚠️  Critical ports: {{ critical_ports_check.stdout_lines | length }} services on monitored ports"
          - "👥 User accounts: {{ user_count.stdout.strip() if user_count.rc == 0 else 'N/A' }} total users"
          - "🔐 Admin account: {{ 'Detected' if admin_check.stdout and admin_check.stdout.strip() != '0' else 'Not found' }}"
          - "📊 Full report: {{ audit_report_dir }}/security_audit_{{ ansible_date_time.epoch | default('manual') }}.txt"
          - "⚡ Recommendation: Review security findings and implement hardening measures"

# =============================================================================
# Security Audit Coverage:
#
# ✅ Network Service Discovery
# ✅ Critical Port Assessment  
# ✅ Security Process Monitoring
# ✅ Unauthorized Tool Detection
# ✅ User Account Verification
# ✅ SSH Configuration Review
# ✅ System Log Access Audit
# ✅ Active Connection Monitoring
#
# Usage Examples:
#
# Standard security audit:
#   ansible-playbook -i inventory.example QNAP_Security_Audit_Portfolio.yaml
#
# Custom audit directory:
#   ansible-playbook -i inventory.example QNAP_Security_Audit_Portfolio.yaml \
#     -e "audit_report_dir=/secure/audit/reports"
#
# Focus on specific security areas:
#   ansible-playbook -i inventory.example QNAP_Security_Audit_Portfolio.yaml \
#     --tags "network,users"
#
# =============================================================================