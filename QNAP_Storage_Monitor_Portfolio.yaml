---
# =============================================================================
# QNAP NAS STORAGE MONITORING - PORTFOLIO EXAMPLE
# =============================================================================
#
# Purpose: Comprehensive storage health and capacity monitoring for QNAP NAS
# Features: RAID status, storage pools, disk usage, filesystem monitoring
# Capacity Planning: Usage trends, available space, storage optimization
#
# This playbook provides enterprise-grade storage monitoring suitable for
# production environments requiring proactive storage management.
#
# =============================================================================

- name: QNAP NAS Storage Health and Capacity Monitoring
  hosts: nas
  gather_facts: false
  
  vars:
    # Storage monitoring configuration
    storage_report_dir: "/tmp/storage_monitoring"
    usage_threshold_warning: 80
    usage_threshold_critical: 90
    
  tasks:
    - name: Create storage monitoring directory
      ansible.builtin.file:
        path: "{{ storage_report_dir }}"
        state: directory
        mode: '0755'
      delegate_to: localhost
      run_once: true
      
    - name: Monitor all mounted filesystems
      ansible.builtin.raw: "df -h"
      register: all_filesystems
      
    - name: Check RAID/MD array status
      ansible.builtin.raw: "cat /proc/mdstat"
      register: raid_status
      ignore_errors: yes
      
    - name: Display RAID health summary
      ansible.builtin.debug:
        msg: "RAID monitoring: {{ 'Active arrays detected' if raid_status.rc == 0 and raid_status.stdout else 'No RAID arrays or status unavailable' }}"
      
    - name: Identify storage pools and cache devices
      ansible.builtin.raw: "df -h | grep -E '(CACHEDEV|HDA|md)'"
      register: storage_pools
      ignore_errors: yes
      
    - name: Show storage pool summary
      ansible.builtin.debug:
        msg: "Storage pools detected: {{ storage_pools.stdout_lines | length if storage_pools.rc == 0 else 0 }}"
      
    - name: Check disk device availability
      ansible.builtin.raw: "ls -la /dev/sd* /dev/nvme* 2>/dev/null | wc -l || echo '0'"
      register: disk_devices_count
      ignore_errors: yes
      
    - name: Monitor disk I/O statistics
      ansible.builtin.raw: "cat /proc/diskstats | head -20"
      register: disk_iostats
      ignore_errors: yes
      
    - name: Check for storage pool usage warnings
      ansible.builtin.raw: "df -h | grep -E '(CACHEDEV|HDA)' | awk '$5+0 > {{ usage_threshold_warning }} {print $1, $5}'"
      register: storage_warnings
      ignore_errors: yes
      
    - name: Identify critical storage usage
      ansible.builtin.raw: "df -h | grep -E '(CACHEDEV|HDA)' | awk '$5+0 > {{ usage_threshold_critical }} {print $1, $5}'"
      register: storage_critical
      ignore_errors: yes
      
    - name: Monitor mounted filesystem types
      ansible.builtin.raw: "mount | grep -E '(ext|xfs|btrfs|zfs)' | wc -l"
      register: filesystem_types
      ignore_errors: yes
      
    - name: Check storage pool mount status
      ansible.builtin.raw: "mount | grep CACHEDEV"
      register: mount_status
      ignore_errors: yes
      
    - name: Generate comprehensive storage report
      ansible.builtin.copy:
        content: |
          ===============================================
          QNAP Storage Monitoring Report
          ===============================================
          Generated: {{ ansible_date_time.iso8601 | default('Manual execution') }}
          Target System: {{ inventory_hostname }}
          Monitoring Thresholds: Warning {{ usage_threshold_warning }}%, Critical {{ usage_threshold_critical }}%
          
          FILESYSTEM OVERVIEW:
          {{ all_filesystems.stdout }}
          
          RAID ARRAY STATUS:
          {{ raid_status.stdout if raid_status.rc == 0 else 'RAID status not available or no arrays configured' }}
          
          STORAGE POOL ANALYSIS:
          {{ storage_pools.stdout if storage_pools.rc == 0 else 'No storage pools detected or information unavailable' }}
          
          DISK DEVICE INVENTORY:
          Total disk devices detected: {{ disk_devices_count.stdout.strip() }}
          
          DISK I/O PERFORMANCE:
          {{ disk_iostats.stdout if disk_iostats.rc == 0 else 'Disk I/O statistics not available' }}
          
          STORAGE CAPACITY ALERTS:
          
          Warning Level (>{{ usage_threshold_warning }}%):
          {{ storage_warnings.stdout if storage_warnings.stdout else 'No storage pools exceeding warning threshold' }}
          
          Critical Level (>{{ usage_threshold_critical }}%):
          {{ storage_critical.stdout if storage_critical.stdout else 'No storage pools at critical usage levels' }}
          
          MOUNT STATUS:
          {{ mount_status.stdout if mount_status.rc == 0 else 'Storage pool mount information not available' }}
          
          ===============================================
          STORAGE HEALTH SUMMARY:
          - Total Filesystems: {{ all_filesystems.stdout_lines | length }}
          - Storage Pools: {{ storage_pools.stdout_lines | length if storage_pools.rc == 0 else 0 }}
          - RAID Status: {{ 'Monitored' if raid_status.rc == 0 else 'Not Available' }}
          - Usage Warnings: {{ storage_warnings.stdout_lines | length if storage_warnings.stdout else 0 }}
          - Critical Alerts: {{ storage_critical.stdout_lines | length if storage_critical.stdout else 0 }}
          
          RECOMMENDATIONS:
          - Monitor usage trends for capacity planning
          - Verify RAID array health regularly
          - Address any critical usage alerts immediately
          - Consider storage expansion if warnings persist
          ===============================================
        dest: "{{ storage_report_dir }}/storage_report_{{ ansible_date_time.epoch | default('manual') }}.txt"
      delegate_to: localhost
      
    - name: Display storage monitoring summary
      ansible.builtin.debug:
        msg:
          - "💾 Storage monitoring completed"
          - "📊 Filesystems analyzed: {{ all_filesystems.stdout_lines | length }}"
          - "🗄️  Storage pools: {{ storage_pools.stdout_lines | length if storage_pools.rc == 0 else 0 }}"
          - "🔍 RAID arrays: {{ 'Monitored' if raid_status.rc == 0 else 'Not detected' }}"
          - "⚠️  Usage warnings: {{ storage_warnings.stdout_lines | length if storage_warnings.stdout else 0 }}"
          - "🚨 Critical alerts: {{ storage_critical.stdout_lines | length if storage_critical.stdout else 0 }}"
          - "📈 Full report: {{ storage_report_dir }}/storage_report_{{ ansible_date_time.epoch | default('manual') }}.txt"

# =============================================================================
# Storage Monitoring Features:
#
# ✅ Comprehensive Filesystem Analysis
# ✅ RAID Array Health Monitoring
# ✅ Storage Pool Capacity Tracking
# ✅ Disk Device Inventory
# ✅ I/O Performance Statistics
# ✅ Automated Usage Threshold Alerts
# ✅ Mount Status Verification
# ✅ Capacity Planning Data
#
# Usage Examples:
#
# Standard storage monitoring:
#   ansible-playbook -i inventory.example QNAP_Storage_Monitor_Portfolio.yaml
#
# Custom threshold monitoring:
#   ansible-playbook -i inventory.example QNAP_Storage_Monitor_Portfolio.yaml \
#     -e "usage_threshold_warning=75" -e "usage_threshold_critical=85"
#
# Specific storage focus:
#   ansible-playbook -i inventory.example QNAP_Storage_Monitor_Portfolio.yaml \
#     --tags "capacity,raid"
#
# =============================================================================